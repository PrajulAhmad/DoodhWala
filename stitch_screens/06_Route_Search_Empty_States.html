<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>DoodhWala - Route Search</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-high": "#e5e9eb",
                      "on-background": "#181c1e",
                      "on-surface": "#181c1e",
                      "tertiary-fixed": "#ffddb8",
                      "surface-tint": "#1b6d24",
                      "tertiary": "#794b00",
                      "error-container": "#ffdad6",
                      "outline-variant": "#bfcaba",
                      "on-secondary-fixed-variant": "#414754",
                      "secondary-fixed-dim": "#c1c6d7",
                      "error": "#ba1a1a",
                      "outline": "#707a6c",
                      "on-error": "#ffffff",
                      "on-primary-fixed-variant": "#005312",
                      "primary": "#0d631b",
                      "on-tertiary-fixed": "#2a1700",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-fixed-variant": "#653e00",
                      "secondary-container": "#dde2f3",
                      "on-secondary": "#ffffff",
                      "primary-fixed-dim": "#88d982",
                      "primary-container": "#2e7d32",
                      "tertiary-container": "#9a6100",
                      "on-secondary-fixed": "#161c27",
                      "on-primary-container": "#cbffc2",
                      "on-secondary-container": "#5e6473",
                      "on-primary": "#ffffff",
                      "surface": "#f7fafc",
                      "on-tertiary": "#ffffff",
                      "inverse-surface": "#2d3133",
                      "primary-fixed": "#a3f69c",
                      "surface-container-low": "#f1f4f6",
                      "background": "#f7fafc",
                      "inverse-on-surface": "#eef1f3",
                      "on-primary-fixed": "#002204",
                      "tertiary-fixed-dim": "#ffb95f",
                      "inverse-primary": "#88d982",
                      "secondary-fixed": "#dde2f3",
                      "on-tertiary-container": "#ffeedf",
                      "surface-variant": "#e0e3e5",
                      "on-surface-variant": "#40493d",
                      "surface-container-highest": "#e0e3e5",
                      "on-error-container": "#93000a",
                      "surface-dim": "#d7dadc",
                      "surface-container": "#ebeef0",
                      "surface-bright": "#f7fafc",
                      "secondary": "#585e6c"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-md": "16px",
                      "gutter": "16px",
                      "touch-target-min": "48px",
                      "stack-sm": "8px",
                      "margin": "16px",
                      "base": "4px",
                      "stack-lg": "24px"
              },
              "fontFamily": {
                      "body-md": ["Inter"],
                      "display-title": ["Inter"],
                      "customer-name": ["Inter"],
                      "button-text": ["Inter"],
                      "label-sm": ["Inter"]
              },
              "fontSize": {
                      "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                      "display-title": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                      "customer-name": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                      "button-text": ["16px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                      "label-sm": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500" }]
              }
            }
          }
        }
    </script>
<style>
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden pb-24">
<!-- Top App Bar (Search State) -->
<header class="sticky top-0 z-50 flex items-center px-gutter w-full h-touch-target-min bg-surface border-b border-outline-variant/30">
<button aria-label="Back" class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-primary/8 rounded-full transition-transform duration-100 scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300, 'FILL' 0;">arrow_back</span>
</button>
<div class="flex-1 ml-2 relative">
<input class="w-full bg-surface-container-low border-none rounded-full h-10 px-4 text-body-md font-body-md focus:ring-2 focus:ring-primary outline-none" placeholder="Search route..." type="text" value="Amit"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 w-6 h-6 flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'wght' 300, 'FILL' 0;">close</span>
</button>
</div>
</header>
<!-- Content Canvas -->
<main class="flex-1 flex flex-col px-gutter pt-stack-md gap-stack-lg">
<!-- Search Results Section (State 1) -->
<section class="flex flex-col gap-stack-sm">
<h2 class="font-label-sm text-label-sm text-on-surface-variant px-1 uppercase tracking-wider">Search Results</h2>
<div class="flex flex-col gap-base">
<!-- Result Card 1 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-margin flex items-center justify-between active:bg-primary/8 transition-colors cursor-pointer">
<div class="flex items-center gap-margin">
<div class="w-12 h-12 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container font-customer-name text-customer-name">
                            A
                        </div>
<div class="flex flex-col">
<span class="font-customer-name text-customer-name text-on-surface">Amit Kumar</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">Sector 14, Plot 42</span>
</div>
</div>
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'wght' 300, 'FILL' 0;">chevron_right</span>
</div>
<!-- Result Card 2 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-margin flex items-center justify-between active:bg-primary/8 transition-colors cursor-pointer">
<div class="flex items-center gap-margin">
<div class="w-12 h-12 bg-secondary-container rounded-full flex items-center justify-center text-on-secondary-container font-customer-name text-customer-name">
                            A
                        </div>
<div class="flex flex-col">
<span class="font-customer-name text-customer-name text-on-surface">Amit Sharma</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">DLF Phase 2, B-Block</span>
</div>
</div>
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'wght' 300, 'FILL' 0;">chevron_right</span>
</div>
</div>
</section>
<!-- Divider -->
<div class="h-px w-full bg-outline-variant/30 my-stack-md"></div>
<!-- Empty State Section (State 2) -->
<section class="flex-1 flex flex-col items-center justify-center text-center px-margin py-12 mt-8 bg-surface-container-low rounded-xl border border-dashed border-outline-variant">
<div class="w-32 h-32 mb-stack-md text-secondary/40 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-size: 80px; font-variation-settings: 'wght' 200, 'FILL' 0;">local_shipping</span>
</div>
<h3 class="font-customer-name text-customer-name text-on-surface mb-stack-sm">No deliveries scheduled for this shift.</h3>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg max-w-xs mx-auto">Check the Evening tab or add customers in Settings.</p>
<button class="bg-primary text-on-primary h-touch-target-min px-6 rounded-full font-button-text text-button-text flex items-center gap-2 active:bg-primary/90 transition-colors shadow-sm">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'wght' 400, 'FILL' 1;">add</span>
                Add Customer
            </button>
</section>
</main>
<!-- Bottom Navigation Bar (Home Active) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-base py-stack-sm bg-surface" style="border-top: none; box-shadow: 0 -4px 16px -4px rgba(0,0,0,0.05);">
<button class="flex flex-col items-center justify-center w-16 h-16 active:scale-90 transition-all text-on-surface-variant group">
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 mb-1 group-hover:bg-primary-container/80 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 400, 'FILL' 1;">route</span>
</div>
<span class="font-label-sm text-label-sm text-[11px] text-on-surface">Home</span>
</button>
<button class="flex flex-col items-center justify-center w-16 h-16 active:scale-90 transition-all text-on-secondary-container hover:bg-secondary-container/50 rounded-lg group">
<div class="flex flex-col items-center justify-center px-4 py-1 mb-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300, 'FILL' 0;">groups</span>
</div>
<span class="font-label-sm text-label-sm text-[11px]">Customers</span>
</button>
<button class="flex flex-col items-center justify-center w-16 h-16 active:scale-90 transition-all text-on-secondary-container hover:bg-secondary-container/50 rounded-lg group">
<div class="flex flex-col items-center justify-center px-4 py-1 mb-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300, 'FILL' 0;">receipt_long</span>
</div>
<span class="font-label-sm text-label-sm text-[11px]">Billing</span>
</button>
<button class="flex flex-col items-center justify-center w-16 h-16 active:scale-90 transition-all text-on-secondary-container hover:bg-secondary-container/50 rounded-lg group">
<div class="flex flex-col items-center justify-center px-4 py-1 mb-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300, 'FILL' 0;">payments</span>
</div>
<span class="font-label-sm text-label-sm text-[11px]">Payments</span>
</button>
<button class="flex flex-col items-center justify-center w-16 h-16 active:scale-90 transition-all text-on-secondary-container hover:bg-secondary-container/50 rounded-lg group">
<div class="flex flex-col items-center justify-center px-4 py-1 mb-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300, 'FILL' 0;">settings</span>
</div>
<span class="font-label-sm text-label-sm text-[11px]">Settings</span>
</button>
</nav>
</body></html>
