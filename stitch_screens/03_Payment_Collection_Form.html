<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Collection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#2e7d32",
                        "inverse-primary": "#88d982",
                        "on-surface": "#181c1e",
                        "surface-container-high": "#e5e9eb",
                        "on-primary-fixed-variant": "#005312",
                        "tertiary-fixed": "#ffddb8",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "inverse-surface": "#2d3133",
                        "surface-dim": "#d7dadc",
                        "surface": "#f7fafc",
                        "surface-container": "#ebeef0",
                        "on-secondary-fixed": "#161c27",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#002204",
                        "on-background": "#181c1e",
                        "on-tertiary-fixed": "#2a1700",
                        "on-secondary-fixed-variant": "#414754",
                        "surface-tint": "#1b6d24",
                        "on-surface-variant": "#40493d",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#dde2f3",
                        "outline": "#707a6c",
                        "secondary": "#585e6c",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f1f4f6",
                        "surface-bright": "#f7fafc",
                        "on-primary-container": "#cbffc2",
                        "on-secondary-container": "#5e6473",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary-container": "#9a6100",
                        "primary": "#0d631b",
                        "tertiary": "#794b00",
                        "on-tertiary-container": "#ffeedf",
                        "tertiary-fixed-dim": "#ffb95f",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-fixed-dim": "#c1c6d7",
                        "primary-fixed": "#a3f69c",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eef1f3",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#88d982",
                        "background": "#f7fafc",
                        "secondary-fixed": "#dde2f3",
                        "outline-variant": "#bfcaba"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "24px",
                        "base": "4px",
                        "stack-sm": "8px",
                        "gutter": "16px",
                        "touch-target-min": "48px",
                        "stack-md": "16px",
                        "margin": "16px"
                    },
                    "fontFamily": {
                        "button-text": ["Inter"],
                        "customer-name": ["Inter"],
                        "label-sm": ["Inter"],
                        "display-title": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "button-text": ["16px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "customer-name": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "label-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "display-title": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "amount-large": ["48px", {"lineHeight": "56px", "fontWeight": "700", "letterSpacing": "-0.02em"}]
                    }
                }
            }
        }
    </script>
<style>
        /* Hide arrows on number input */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        /* Custom scrollbar for dropdown */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: theme('colors.surface-dim');
            border-radius: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md select-none">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center justify-between px-gutter w-full h-touch-target-min bg-surface dark:bg-background">
<button aria-label="Back" class="h-touch-target-min w-touch-target-min flex items-center justify-center -ml-2 text-primary dark:text-primary-fixed-dim hover:bg-primary/8 dark:hover:bg-primary-fixed-dim/8 rounded-full active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-display-title text-display-title text-primary dark:text-primary-fixed-dim">Collect Payment</h1>
<div class="w-touch-target-min h-touch-target-min"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-gutter pb-stack-lg pt-stack-sm w-full max-w-md mx-auto">
<!-- Searchable Customer Picker -->
<div class="relative w-full mb-stack-lg z-40" id="customer-picker-container">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1" for="customer-search">Customer</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">search</span>
<input autocomplete="off" class="w-full h-touch-target-min pl-10 pr-10 bg-surface-container-lowest border-2 border-surface-variant rounded-lg font-customer-name text-customer-name text-on-background focus:border-primary focus:ring-0 transition-colors placeholder:text-on-surface-variant/50" id="customer-search" placeholder="Search customer..." type="text" value="Amit Kumar"/>
<button aria-label="Clear search" class="absolute right-2 h-10 w-10 flex items-center justify-center text-on-surface-variant hover:text-on-background rounded-full hidden" id="clear-search">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Dropdown Results (Hidden by default) -->
<div class="absolute top-full left-0 right-0 mt-1 bg-surface-container-lowest border border-surface-variant rounded-lg shadow-lg overflow-hidden hidden max-h-48 overflow-y-auto custom-scrollbar" id="customer-dropdown">
<ul class="py-1">
<li class="px-4 py-3 hover:bg-surface-container-low cursor-pointer flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold">AK</div>
<div>
<p class="font-customer-name text-customer-name text-on-background">Amit Kumar</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Balance: ₹450</p>
</div>
</li>
<li class="px-4 py-3 hover:bg-surface-container-low cursor-pointer flex items-center gap-3 border-t border-surface-variant">
<div class="w-10 h-10 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center font-bold">SR</div>
<div>
<p class="font-customer-name text-customer-name text-on-background">Suresh Rao</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Balance: ₹120</p>
</div>
</li>
</ul>
</div>
</div>
<!-- Spacer to push critical interactive elements to bottom 60% -->
<div class="flex-grow"></div>
<!-- Amount Input Group -->
<div class="mb-stack-lg bg-surface-container-lowest border border-surface-variant rounded-xl p-stack-md flex flex-col items-center justify-center relative overflow-hidden shadow-sm">
<div class="absolute inset-0 bg-primary/5 pointer-events-none"></div>
<label class="font-label-sm text-label-sm text-on-surface-variant mb-2 relative z-10" for="amount-input">Amount Received</label>
<div class="flex items-center justify-center relative z-10">
<span class="text-amount-large text-primary mr-1">₹</span>
<input autofocus="" class="w-full max-w-[200px] bg-transparent border-none text-amount-large text-on-background text-center focus:ring-0 p-0 placeholder:text-on-background/20" id="amount-input" inputmode="decimal" placeholder="0" type="number"/>
</div>
<div class="h-0.5 w-32 bg-primary/20 mt-2 rounded-full relative z-10"></div>
</div>
<!-- Payment Mode Toggle -->
<div class="mb-stack-lg">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-2">Payment Mode</p>
<div aria-label="Payment Mode" class="flex gap-stack-sm w-full" role="radiogroup">
<!-- Cash Option (Active) -->
<label class="flex-1 cursor-pointer relative group">
<input checked="" class="peer sr-only" name="payment_mode" type="radio" value="cash"/>
<div class="h-16 rounded-xl flex items-center justify-center gap-2 border-2 border-transparent bg-primary text-on-primary peer-checked:bg-primary peer-checked:text-on-primary peer-checked:shadow-sm peer-active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-button-text text-button-text">Cash</span>
</div>
</label>
<!-- UPI Option (Inactive) -->
<label class="flex-1 cursor-pointer relative group">
<input class="peer sr-only" name="payment_mode" type="radio" value="upi"/>
<div class="h-16 rounded-xl flex items-center justify-center gap-2 border-2 border-outline bg-surface-container-lowest text-on-surface peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-active:scale-[0.98] transition-all hover:bg-surface-container-low">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 0;">qr_code_scanner</span>
<span class="font-button-text text-button-text">UPI</span>
</div>
</label>
</div>
</div>
<!-- Optional Notes -->
<div class="mb-stack-lg">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1 mb-1" for="collection-notes">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">edit_note</span>
                Notes (Optional)
            </label>
<textarea class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg p-3 font-body-md text-body-md text-on-background focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-none" id="collection-notes" placeholder="E.g., Advance for next month..." rows="2"></textarea>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-gutter bg-surface dark:bg-background border-t border-outline-variant/30 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
<div class="max-w-md mx-auto">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-xl font-button-text text-button-text flex items-center justify-center gap-2 active:scale-[0.98] transition-all hover:bg-surface-tint shadow-sm" id="confirm-btn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Confirm Payment
            </button>
</div>
</div>
<!-- Padding for fixed bottom area -->
<div class="h-[88px] w-full"></div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('customer-search');
            const clearBtn = document.getElementById('clear-search');
            const dropdown = document.getElementById('customer-dropdown');
            const container = document.getElementById('customer-picker-container');
            const amountInput = document.getElementById('amount-input');
            const confirmBtn = document.getElementById('confirm-btn');

            // Set initial focus to amount
            setTimeout(() => amountInput.focus(), 100);

            // Search Interaction
            searchInput.addEventListener('focus', () => {
                dropdown.classList.remove('hidden');
                container.classList.add('z-50');
            });

            searchInput.addEventListener('input', (e) => {
                if(e.target.value.length > 0) {
                    clearBtn.classList.remove('hidden');
                    dropdown.classList.remove('hidden');
                } else {
                    clearBtn.classList.add('hidden');
                }
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.classList.add('hidden');
                searchInput.focus();
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!container.contains(e.target)) {
                    dropdown.classList.add('hidden');
                    container.classList.remove('z-50');
                }
            });

            // Select item from dropdown
            const items = dropdown.querySelectorAll('li');
            items.forEach(item => {
                item.addEventListener('click', () => {
                    const name = item.querySelector('.text-customer-name').innerText;
                    searchInput.value = name;
                    dropdown.classList.add('hidden');
                    container.classList.remove('z-50');
                    clearBtn.classList.remove('hidden');
                    amountInput.focus();
                });
            });

            // Format amount input visual feedback
            amountInput.addEventListener('input', (e) => {
                const val = e.target.value;
                if(val && Number(val) > 0) {
                    confirmBtn.classList.remove('opacity-50', 'pointer-events-none');
                } else {
                    confirmBtn.classList.add('opacity-50', 'pointer-events-none');
                }
            });

            // Initial button state
            if(!amountInput.value) {
                confirmBtn.classList.add('opacity-50', 'pointer-events-none');
            }

            // Simulate Confimation
            confirmBtn.addEventListener('click', () => {
                const originalText = confirmBtn.innerHTML;
                confirmBtn.innerHTML = `<span class="material-symbols-outlined animate-spin" style="font-variation-settings: 'FILL' 0;">sync</span> Processing...`;
                confirmBtn.classList.add('opacity-80', 'pointer-events-none');
                
                setTimeout(() => {
                    confirmBtn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">done_all</span> Payment Saved`;
                    confirmBtn.classList.remove('bg-primary');
                    confirmBtn.classList.add('bg-[#107c2a]'); // Darker success green
                    
                    setTimeout(() => {
                        confirmBtn.innerHTML = originalText;
                        confirmBtn.classList.remove('opacity-80', 'pointer-events-none', 'bg-[#107c2a]');
                        confirmBtn.classList.add('bg-primary');
                        amountInput.value = '';
                        amountInput.focus();
                        confirmBtn.classList.add('opacity-50', 'pointer-events-none');
                    }, 2000);
                }, 800);
            });
        });
    </script>
</body></html>
