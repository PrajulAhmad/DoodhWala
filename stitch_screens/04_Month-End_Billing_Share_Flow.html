<body class="bg-background text-on-background min-h-screen flex flex-col pb-[80px] md:pb-0">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center justify-between px-gutter w-full h-touch-target-min bg-surface dark:bg-background docked full-width top-0">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-touch-target-min h-touch-target-min text-on-surface-variant hover:bg-primary/8 rounded-full scale-95 transition-transform duration-100">
<span class="material-symbols-outlined">local_shipping</span>
</button>
<h1 class="font-display-title text-display-title text-primary dark:text-primary-fixed-dim">DoodhWala</h1>
</div>
<div class="flex items-center">
<button class="flex items-center justify-center w-touch-target-min h-touch-target-min text-on-surface-variant hover:bg-primary/8 rounded-full scale-95 transition-transform duration-100">
<span class="material-symbols-outlined">search</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-3xl mx-auto px-gutter py-stack-lg">
<!-- Page Header & Global Action -->
<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-stack-md mb-stack-lg bg-surface-container-low p-gutter rounded-xl border border-outline-variant">
<div>
<h2 class="font-display-title text-display-title text-on-surface flex items-center gap-2">
<span class="text-2xl">🧾</span> June 2026 Billing
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Manage and send invoices for the month.</p>
</div>
<button class="h-touch-target-min px-6 bg-primary text-on-primary font-button-text text-button-text rounded-full flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-95 transition-all w-full md:w-auto shrink-0 shadow-sm">
<span class="material-symbols-outlined" data-weight="fill">send</span>
                Send All Invoices
            </button>
</div>
<!-- Customer List (Focused lower 60% concept) -->
<div class="space-y-stack-sm flex flex-col justify-end min-h-[530px]">
<!-- Item 1: Amit Kumar (Actionable) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-gutter flex flex-col sm:flex-row items-start sm:items-center justify-between gap-stack-md shadow-sm">
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<h3 class="font-customer-name text-customer-name text-on-surface">Amit Kumar</h3>
<span class="inline-flex items-center px-2 py-0.5 rounded-full bg-surface-variant text-on-surface-variant font-label-sm text-label-sm gap-1 border border-outline-variant">
                            ⏳ Not Sent
                        </span>
</div>
<p class="font-body-md text-body-md text-error flex items-center gap-1 font-semibold">
                        ₹4,060 Due
                    </p>
</div>
<button class="w-full sm:w-auto h-touch-target-min px-6 bg-primary-container text-on-primary-fixed-variant font-button-text text-button-text rounded-full flex items-center justify-center gap-2 hover:bg-inverse-primary active:scale-95 transition-all border border-primary">
<span class="material-symbols-outlined">send</span>
                    Send
                </button>
</div>
<!-- Item 2: Rohan Sharma (Completed) -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-gutter flex flex-col sm:flex-row items-start sm:items-center justify-between gap-stack-md opacity-80">
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<h3 class="font-customer-name text-customer-name text-on-surface line-through decoration-secondary">Rohan Sharma</h3>
<span class="inline-flex items-center px-2 py-0.5 rounded-full bg-primary/10 text-primary font-label-sm text-label-sm gap-1 border border-primary/20">
                            ✅ Sent (SHARED)
                        </span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
                        ₹0
                    </p>
</div>
<div class="h-touch-target-min px-6 flex items-center justify-center text-primary font-button-text text-button-text w-full sm:w-auto">
<span class="material-symbols-outlined mr-2">check_circle</span>
                    Done
                </div>
</div>
<!-- Item 3: Priya Devi (Error/Retry) -->
<div class="bg-error-container/20 border border-error/30 rounded-xl p-gutter flex flex-col sm:flex-row items-start sm:items-center justify-between gap-stack-md">
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<h3 class="font-customer-name text-customer-name text-on-surface">Priya Devi</h3>
<span class="inline-flex items-center px-2 py-0.5 rounded-full bg-error text-on-error font-label-sm text-label-sm gap-1">
                            ❌ Retry
                        </span>
</div>
<p class="font-body-md text-body-md text-error flex items-center gap-1 font-semibold">
                        ₹1,200 Due
                    </p>
</div>
<button class="w-full sm:w-auto h-touch-target-min px-6 bg-error text-on-error font-button-text text-button-text rounded-full flex items-center justify-center gap-2 hover:bg-on-error-container active:scale-95 transition-all shadow-sm">
<span class="material-symbols-outlined">refresh</span>
                    Retry
                </button>
</div>
</div>
</main>

<span class="material-symbols-outlined">groups</span>

</a>

<span class="material-symbols-outlined" data-weight="fill">receipt_long</span>
<span class="font-label-sm text-label-sm mt-1">Billing</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container dark:text-on-secondary-fixed-variant hover:bg-secondary-container dark:hover:bg-secondary-fixed-dim active:scale-90 transition-all rounded-lg p-2 min-w-[64px] min-h-[48px]" href="#">
<span class="material-symbols-outlined">payments</span>
<span class="font-label-sm text-label-sm mt-1">Payments</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container dark:text-on-secondary-fixed-variant hover:bg-secondary-container dark:hover:bg-secondary-fixed-dim active:scale-90 transition-all rounded-lg p-2 min-w-[64px] min-h-[48px]" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-sm text-label-sm mt-1">Settings</span>
</a>
</nav>
