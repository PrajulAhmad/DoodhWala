<body class="bg-surface text-on-surface font-body-md antialiased pb-[100px]">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-background sticky top-0 z-50 flex items-center justify-between px-gutter w-full h-touch-target-min border-b border-surface-variant md:hidden">
<button aria-label="Go back" class="w-touch-target-min h-touch-target-min flex items-center justify-center text-on-surface-variant hover:bg-primary/8 active:scale-95 transition-transform duration-100 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-display-title text-display-title text-on-surface truncate px-2">Add Customer</h1>
<div class="w-touch-target-min h-touch-target-min"></div> <!-- Spacer to center title -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md mx-auto px-gutter py-stack-lg space-y-stack-lg">
<!-- Section: Basic Details -->
<section class="bg-surface-container-lowest p-stack-md rounded-xl border border-surface-variant shadow-sm space-y-stack-md">
<h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Basic Details</h2>
<!-- Full Name -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface" for="fullName">Full Name</label>
<div class="relative focus-ring rounded-lg border border-outline-variant bg-surface transition-colors">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">person</span>
<input class="w-full h-[48px] pl-10 pr-4 bg-transparent border-none text-body-md text-on-surface placeholder:text-outline focus:ring-0 rounded-lg" id="fullName" placeholder="e.g. Rahul Sharma" type="text"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface" for="phone">Phone Number</label>
<div class="relative focus-ring rounded-lg border border-outline-variant bg-surface transition-colors">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">call</span>
<input class="w-full h-[48px] pl-10 pr-4 bg-transparent border-none text-body-md text-on-surface placeholder:text-outline focus:ring-0 rounded-lg" id="phone" placeholder="10-digit mobile number" type="tel"/>
</div>
</div>
<!-- Address -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface" for="address">Address</label>
<div class="relative focus-ring rounded-lg border border-outline-variant bg-surface transition-colors">
<span class="material-symbols-outlined absolute left-3 top-3 text-on-surface-variant" style="font-size: 20px;">location_on</span>
<textarea class="w-full pl-10 pr-4 py-3 bg-transparent border-none text-body-md text-on-surface placeholder:text-outline focus:ring-0 rounded-lg resize-none" id="address" placeholder="House no, Street, Landmark" rows="2"></textarea>
</div>
</div>
<!-- Route Sequence Number -->
<div class="flex items-center justify-between pt-stack-sm border-t border-surface-variant">
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface block">Route Sequence Number</label>
<span class="text-xs text-on-surface-variant block">Delivery order priority</span>
</div>
<div class="flex items-center bg-surface border border-outline-variant rounded-lg h-[48px] p-1">
<button aria-label="Decrease sequence" class="w-[40px] h-[40px] flex items-center justify-center rounded-md hover:bg-surface-variant active:bg-surface-dim text-primary transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<input aria-label="Sequence number" class="w-[48px] text-center bg-transparent border-none font-customer-name text-customer-name text-on-surface focus:ring-0 p-0" type="number" value="1"/>
<button aria-label="Increase sequence" class="w-[40px] h-[40px] flex items-center justify-center rounded-md hover:bg-surface-variant active:bg-surface-dim text-primary transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</section>
<!-- Section: Billing Preferences -->
<section class="bg-surface-container-lowest p-stack-md rounded-xl border border-surface-variant shadow-sm flex items-center justify-between">
<div class="pr-4">
<label class="font-button-text text-button-text text-on-surface block mb-1" for="autoInvoice">Auto-include in monthly invoices</label>
<span class="text-xs text-on-surface-variant">Generate bill automatically on 1st</span>
</div>
<!-- Custom Toggle -->
<label class="relative inline-flex items-center cursor-pointer flex-shrink-0 h-[48px] w-[60px] justify-end">
<input checked="" class="sr-only peer" id="autoInvoice" type="checkbox"/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[14px] after:left-[8px] after:bg-surface-container-lowest after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</section>
<!-- Section: Subscriptions -->
<section class="space-y-stack-md">
<h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider pl-1">Daily Subscriptions</h2>
<!-- Morning Slot Card -->
<div class="bg-surface-container-lowest rounded-xl border border-surface-variant shadow-sm overflow-hidden relative">
<!-- Slot Header -->
<div class="bg-tertiary-fixed/30 px-stack-md py-stack-sm border-b border-surface-variant flex items-center justify-between">
<div class="flex items-center gap-2 text-tertiary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">light_mode</span>
<span class="font-button-text text-button-text">Morning Slot</span>
</div>
<!-- Enabled Toggle -->
<label class="relative inline-flex items-center cursor-pointer h-[32px]">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-9 h-5 bg-surface-variant rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[6px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-tertiary-container"></div>
</label>
</div>
<div class="p-stack-md space-y-stack-md">
<!-- Product Picker -->
<div class="relative focus-ring rounded-lg border border-outline-variant bg-surface">
<select class="w-full h-[48px] pl-4 pr-10 bg-transparent border-none text-body-md text-on-surface focus:ring-0 rounded-lg appearance-none cursor-pointer">
<option value="cow_milk">Cow Milk (Raw)</option>
<option value="buffalo_milk">Buffalo Milk (Raw)</option>
<option value="a2_milk">A2 Gir Cow Milk</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
<div class="grid grid-cols-2 gap-stack-md">
<!-- Quantity Picker -->
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1">Quantity (L)</label>
<div class="flex items-center bg-surface border border-outline-variant rounded-lg h-[48px] p-1">
<button class="w-[36px] h-full flex items-center justify-center rounded text-primary hover:bg-surface-variant active:bg-surface-dim">
<span class="material-symbols-outlined" style="font-size: 20px;">remove</span>
</button>
<input class="w-full text-center bg-transparent border-none font-button-text text-button-text text-on-surface focus:ring-0 p-0" readonly="" type="text" value="1.0"/>
<button class="w-[36px] h-full flex items-center justify-center rounded text-primary hover:bg-surface-variant active:bg-surface-dim">
<span class="material-symbols-outlined" style="font-size: 20px;">add</span>
</button>
</div>
</div>
<!-- Rate Picker -->
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1">Rate (₹/L)</label>
<div class="relative focus-ring rounded-lg border border-outline-variant bg-surface h-[48px] flex items-center px-3">
<span class="text-on-surface-variant font-button-text">₹</span>
<input class="w-full h-full bg-transparent border-none text-button-text font-button-text text-on-surface focus:ring-0 text-right" type="number" value="65"/>
</div>
</div>
</div>
</div>
</div>
<!-- Evening Slot Card -->
<div class="bg-surface-container-lowest rounded-xl border border-surface-variant shadow-sm overflow-hidden relative">
<!-- Slot Header -->
<div class="bg-secondary-container/30 px-stack-md py-stack-sm border-b border-surface-variant flex items-center justify-between">
<div class="flex items-center gap-2 text-on-secondary-fixed-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
<span class="font-button-text text-button-text">Evening Slot</span>
</div>
<!-- Enabled Toggle -->
<label class="relative inline-flex items-center cursor-pointer h-[32px]">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-9 h-5 bg-surface-variant rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[6px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-secondary"></div>
</label>
</div>
<div class="p-stack-md space-y-stack-md">
<!-- Product Picker -->
<div class="relative focus-ring rounded-lg border border-outline-variant bg-surface">
<select class="w-full h-[48px] pl-4 pr-10 bg-transparent border-none text-body-md text-on-surface focus:ring-0 rounded-lg appearance-none cursor-pointer">
<option value="cow_milk">Cow Milk (Raw)</option>
<option selected="" value="buffalo_milk">Buffalo Milk (Raw)</option>
<option value="a2_milk">A2 Gir Cow Milk</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
<div class="grid grid-cols-2 gap-stack-md">
<!-- Quantity Picker -->
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1">Quantity (L)</label>
<div class="flex items-center bg-surface border border-outline-variant rounded-lg h-[48px] p-1">
<button class="w-[36px] h-full flex items-center justify-center rounded text-primary hover:bg-surface-variant active:bg-surface-dim">
<span class="material-symbols-outlined" style="font-size: 20px;">remove</span>
</button>
<input class="w-full text-center bg-transparent border-none font-button-text text-button-text text-on-surface focus:ring-0 p-0" readonly="" type="text" value="0.5"/>
<button class="w-[36px] h-full flex items-center justify-center rounded text-primary hover:bg-surface-variant active:bg-surface-dim">
<span class="material-symbols-outlined" style="font-size: 20px;">add</span>
</button>
</div>
</div>
<!-- Rate Picker -->
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1">Rate (₹/L)</label>
<div class="relative focus-ring rounded-lg border border-outline-variant bg-surface h-[48px] flex items-center px-3">
<span class="text-on-surface-variant font-button-text">₹</span>
<input class="w-full h-full bg-transparent border-none text-button-text font-button-text text-on-surface focus:ring-0 text-right" type="number" value="65"/>
</div>
</div>
</div>
</div>
</div>
</section>
<!-- Special Notes -->
<section class="bg-surface-container-lowest p-stack-md rounded-xl border border-surface-variant shadow-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-2" for="notes">Special Notes (Delivery Instructions)</label>
<div class="relative focus-ring rounded-lg border border-outline-variant bg-surface transition-colors">
<textarea class="w-full px-4 py-3 bg-transparent border-none text-body-md text-on-surface placeholder:text-outline focus:ring-0 rounded-lg resize-none" id="notes" placeholder="e.g. Ring doorbell twice, leave bag on handle." rows="3"></textarea>
</div>
</section>
</main>
<!-- Bottom Fixed Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-surface-variant p-gutter shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40 md:hidden pb-safe">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-button-text text-button-text rounded-full flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-95 transition-all shadow-sm">
<span class="material-symbols-outlined" style="font-size: 20px;">save</span>
            Save &amp; Add Customer
        </button>
</div>
