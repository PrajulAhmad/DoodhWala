<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Business Setup Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#585e6c",
                        "tertiary-container": "#9a6100",
                        "primary": "#0d631b",
                        "outline-variant": "#bfcaba",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f7fafc",
                        "on-secondary-container": "#5e6473",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#794b00",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-error-container": "#93000a",
                        "surface-dim": "#d7dadc",
                        "surface-container-low": "#f1f4f6",
                        "on-tertiary-fixed-variant": "#653e00",
                        "primary-container": "#2e7d32",
                        "tertiary-fixed": "#ffddb8",
                        "on-primary-fixed-variant": "#005312",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#1b6d24",
                        "surface-container-highest": "#e0e3e5",
                        "primary-fixed-dim": "#88d982",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#002204",
                        "on-secondary-fixed": "#161c27",
                        "surface": "#f7fafc",
                        "on-primary-container": "#cbffc2",
                        "on-surface": "#181c1e",
                        "inverse-primary": "#88d982",
                        "on-surface-variant": "#40493d",
                        "secondary-fixed": "#dde2f3",
                        "background": "#f7fafc",
                        "surface-container-high": "#e5e9eb",
                        "inverse-on-surface": "#eef1f3",
                        "on-error": "#ffffff",
                        "surface-container": "#ebeef0",
                        "secondary-fixed-dim": "#c1c6d7",
                        "inverse-surface": "#2d3133",
                        "outline": "#707a6c",
                        "on-tertiary-fixed": "#2a1700",
                        "primary-fixed": "#a3f69c",
                        "surface-variant": "#e0e3e5",
                        "on-secondary-fixed-variant": "#414754",
                        "on-background": "#181c1e",
                        "on-tertiary-container": "#ffeedf",
                        "error": "#ba1a1a",
                        "secondary-container": "#dde2f3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "24px",
                        "touch-target-min": "48px",
                        "base": "4px",
                        "gutter": "16px",
                        "margin": "16px",
                        "stack-sm": "8px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "display-title": ["Inter"],
                        "customer-name": ["Inter"],
                        "button-text": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "display-title": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "customer-name": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "button-text": ["16px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased pb-[80px]">
<!-- Top App Bar (Transactional Setup - Suppressed global nav, custom header) -->
<header class="sticky top-0 z-50 flex items-center justify-between px-gutter w-full h-touch-target-min bg-surface dark:bg-background border-b border-surface-variant">
<div class="flex items-center gap-2">
<button aria-label="Back" class="p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-display-title text-display-title text-on-surface">Setup Business Profile</h1>
</div>
</header>
<main class="p-gutter max-w-2xl mx-auto space-y-stack-lg">
<!-- Logo Upload Area -->
<section class="flex flex-col items-center justify-center pt-4">
<div class="relative w-32 h-32 rounded-full border-2 border-dashed border-primary bg-surface-container flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary text-4xl mb-1 icon-fill">add_a_photo</span>
<span class="font-label-sm text-label-sm text-primary">Upload Logo</span>
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-3 text-center">Add a profile photo for your customers to see.</p>
</section>
<!-- Form Fields -->
<form class="space-y-stack-md" id="setupForm">
<!-- Business Name -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="businessName">Business Name *</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">storefront</span>
</span>
<input class="w-full h-touch-target-min pl-10 pr-4 rounded-lg bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-md text-body-md text-on-surface placeholder-outline transition-all" id="businessName" name="businessName" placeholder="e.g. Sharma Dairy" required="" type="text"/>
</div>
</div>
<!-- Milkman Name -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="milkmanName">Your Name *</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</span>
<input class="w-full h-touch-target-min pl-10 pr-4 rounded-lg bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-md text-body-md text-on-surface placeholder-outline transition-all" id="milkmanName" name="milkmanName" placeholder="Full Name" required="" type="text"/>
</div>
</div>
<!-- Phone Number (Read Only) -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="phoneNumber">Registered Mobile Number</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">smartphone</span>
</span>
<input class="w-full h-touch-target-min pl-10 pr-10 rounded-lg bg-surface-container border border-surface-variant font-body-md text-body-md text-on-surface-variant cursor-not-allowed" disabled="" id="phoneNumber" name="phoneNumber" readonly="" type="tel" value="+91 98765 43210"/>
<span class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary text-sm icon-fill">verified</span>
</span>
</div>
<p class="font-label-sm text-label-sm text-outline mt-1 text-xs">Number verified via OTP.</p>
</div>
<!-- UPI ID -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="upiId">UPI ID for Payments</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">qr_code_scanner</span>
</span>
<input class="w-full h-touch-target-min pl-10 pr-4 rounded-lg bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-md text-body-md text-on-surface placeholder-outline transition-all uppercase" id="upiId" name="upiId" placeholder="e.g. 9876543210@okbiz" type="text"/>
</div>
</div>
<!-- Contact Address -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="address">Base Address *</label>
<div class="relative">
<span class="absolute top-3 left-3 flex items-start pointer-events-none">
<span class="material-symbols-outlined text-outline">location_on</span>
</span>
<textarea class="w-full pl-10 pr-4 py-3 rounded-lg bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 font-body-md text-body-md text-on-surface placeholder-outline transition-all resize-none" id="address" name="address" placeholder="Shop Number, Street, Area" required="" rows="3"></textarea>
</div>
</div>
</form>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 w-full bg-surface border-t border-surface-variant p-gutter z-50">
<button class="w-full h-touch-target-min flex items-center justify-center gap-2 rounded-full bg-primary text-on-primary font-button-text text-button-text shadow-sm transition-all disabled:opacity-50 disabled:bg-surface-variant disabled:text-on-surface-variant disabled:cursor-not-allowed active:scale-95" disabled="" id="saveBtn">
<span class="material-symbols-outlined icon-fill">route</span>
            Save &amp; Start Route
        </button>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('setupForm');
            const saveBtn = document.getElementById('saveBtn');
            const requiredInputs = form.querySelectorAll('input[required], textarea[required]');

            function checkFormValidity() {
                let isValid = true;
                requiredInputs.forEach(input => {
                    if (!input.value.trim()) {
                        isValid = false;
                    }
                });
                
                if (isValid) {
                    saveBtn.removeAttribute('disabled');
                } else {
                    saveBtn.setAttribute('disabled', 'true');
                }
            }

            requiredInputs.forEach(input => {
                input.addEventListener('input', checkFormValidity);
            });

            // Prevent default form submission for demo
            form.addEventListener('submit', (e) => e.preventDefault());
        });
    </script>
</body></html>
