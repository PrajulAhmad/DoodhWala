<body class="bg-background text-on-background h-screen flex flex-col font-body-md overflow-hidden antialiased">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center justify-between px-gutter w-full h-touch-target-min bg-surface dark:bg-background">
<button class="flex items-center justify-center w-10 h-10 rounded-full text-on-surface-variant hover:bg-primary/8 transition-transform duration-100 active:scale-95" type="button">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="flex-1"></div>
<div class="w-10"></div> <!-- Placeholder for balance -->
</header>
<!-- Main Content Canvas (Transactional intent, suppressed nav shell) -->
<main class="flex-1 flex flex-col px-gutter pt-stack-lg pb-stack-md w-full max-w-md mx-auto">
<!-- Header Section -->
<div class="mb-stack-lg flex flex-col items-center text-center">
<h1 class="font-display-title text-display-title text-primary mb-stack-sm">Verify OTP</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sent to <span class="font-button-text text-button-text text-on-background">+91 98765 43210</span></p>
</div>
<!-- Spacer to push content to the 60% thumb reach zone -->
<div class="flex-1"></div>
<!-- Interactive Zone (Lower 60%) -->
<div class="w-full flex flex-col items-center justify-end pb-stack-lg">
<!-- OTP Entry Matrix -->
<!-- Demonstration of Normal State (first 3) and Error State (last 3 for visual example of the requirement) -->
<div class="flex flex-col items-center w-full mb-stack-lg gap-y-2">
<div class="flex justify-between w-full max-w-xs gap-2">
<!-- Normal Input -->
<input aria-label="Digit 1" class="w-12 h-12 text-center font-display-title text-display-title text-on-surface bg-surface-container-lowest border-2 border-outline-variant rounded focus:border-primary focus:outline-none focus:ring-0 transition-colors shadow-sm" maxlength="1" pattern="\d*" type="number" value="4"/>
<input aria-label="Digit 2" class="w-12 h-12 text-center font-display-title text-display-title text-on-surface bg-surface-container-lowest border-2 border-outline-variant rounded focus:border-primary focus:outline-none focus:ring-0 transition-colors shadow-sm" maxlength="1" pattern="\d*" type="number" value="8"/>
<input aria-label="Digit 3" class="w-12 h-12 text-center font-display-title text-display-title text-on-surface bg-surface-container-lowest border-2 border-outline-variant rounded focus:border-primary focus:outline-none focus:ring-0 transition-colors shadow-sm" maxlength="1" pattern="\d*" type="number" value="1"/>
<!-- Error State Demonstration Inputs -->
<input aria-label="Digit 4" class="w-12 h-12 text-center font-display-title text-display-title text-error bg-error-container/20 border-2 border-error rounded focus:outline-none focus:ring-0 transition-colors shadow-sm" maxlength="1" pattern="\d*" type="number" value="9"/>
<input aria-label="Digit 5" class="w-12 h-12 text-center font-display-title text-display-title text-error bg-error-container/20 border-2 border-error rounded focus:outline-none focus:ring-0 transition-colors shadow-sm" maxlength="1" pattern="\d*" type="number" value=""/>
<input aria-label="Digit 6" class="w-12 h-12 text-center font-display-title text-display-title text-error bg-error-container/20 border-2 border-error rounded focus:outline-none focus:ring-0 transition-colors shadow-sm" maxlength="1" pattern="\d*" type="number" value=""/>
</div>
<!-- Error Message associated with Error State -->
<p class="font-label-sm text-label-sm text-error flex items-center gap-1 opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">error</span>
                    Invalid code entered.
                </p>
</div>
<!-- Resend Action -->
<div class="mb-stack-lg">
<button class="font-button-text text-button-text text-primary hover:text-primary-container active:scale-95 transition-all h-touch-target-min px-4 rounded flex items-center justify-center" type="button">
                    Resend OTP
                </button>
</div>
<!-- Primary Action Button (Disabled state shown as per requirements: "disabled until 6 digits entered") -->
<button class="w-full h-14 rounded-lg bg-surface-container-high text-on-surface-variant font-button-text text-button-text flex items-center justify-center cursor-not-allowed opacity-70 transition-colors" disabled="" type="button">
                Verify
            </button>
<!-- Hidden active state for structural reference if needed later: 
            <button type="button" class="w-full h-14 rounded-lg bg-primary text-on-primary font-button-text text-button-text flex items-center justify-center hover:bg-primary-container active:scale-95 transition-all shadow-sm">
                Verify
            </button>
            -->
</div>
</main>
<!-- Note: BottomNavBar and FAB suppressed due to Transactional Intent of OTP Screen -->
<script>
        // Simple script to auto-focus next input for demonstration purposes
        const inputs = document.querySelectorAll('input[type="number"]');
        inputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                if (this.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
